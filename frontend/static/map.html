<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>UniEats | Campus Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* Essential: The map needs a height and width to appear */
        #map {
            height: 100vh; /* Full screen height */
            width: 100%;
        }
        body, html { margin: 0; padding: 0; overflow: hidden; }
        
        /* Optional: Style the marker labels */
        .custom-label { font-family: sans-serif; font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
         window.onload = function() {
            initLoader();
        }
        // 1. Verification Logic
        //window.onload = function() {
        //    if (!localStorage.getItem("uniEats_token")) {

        //    } else {

        // 2. The Google Maps Bootstrap Loader (Standard for 2026)
        function initLoader() {
            (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-imports might be a no-op."):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
                key: "AIzaSyC5yEzV-g2ocEk1_BnLqM1G016Ajm7U3Ss", // Replace with your real key
                v: "weekly"
            });
            
            initMap();
        }

        // 3. Initialize the actual Map
        async function initMap() {
            const { Map } = await google.maps.importLibrary("maps");
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

            // Replace these with your school's exact coordinates
            const schoolCoords = { lat: 36.0189, lng: -78.9206 }; 

            const map = new Map(document.getElementById("map"), {
                zoom: 16,
                center: schoolCoords,
                mapId: "DEMO_MAP_ID", // Required for Advanced Markers
                mapTypeControl: false, // Cleaner UI
                streetViewControl: false
            });

            // Add a main marker for the school
            new AdvancedMarkerElement({
                map: map,
                position: schoolCoords,
                title: "University Campus",
            });
            
            console.log("Map Loaded for authenticated user!");
        }
    </script>
</body>
